org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Rendimiento de build: tareas en paralelo, caché entre builds, configuración bajo demanda.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
kotlin.incremental=true
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# Suppress JVM-target mismatch in tflite_flutter_custom (Java 11 vs Kotlin 21)
kotlin.jvm.target.validation.mode=WARNING
